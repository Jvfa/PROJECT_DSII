<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SayMyName</title>
</head>
<body>
    <h1>Say My Name</h1>
    <form action="/enviarnome" method="post">
        <label for="nome">Nome:</label>
        <input type="text" name="nome" id="nome">
        <button type="submit">Diga Meu Nome</button>
    </form>
    <h2 th:text="${resultado}"></h2>
</body>
</html>
